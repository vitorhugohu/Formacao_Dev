<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos por Query #01</title>
    <link rel="stylesheet" href="../css/estilo.css">
</head>
<body id="exercicio">
    <div id="primeiro">#primeiros</div>
    <div id="segundo" class="destaque" destaque="1">segundo</div>
    <div id="terceiro" metade>#terceiro</div>
    <div id="quarto" class="destaque" destaque="2">#quarto</div>
    <div id="quinto" class="ultimo">#quinto</div>

    <script>
        function selecionarApenasUm(seletor) {

        const elemento = document.querySelector(seletor)
        console.log(elemento)

        }

        selecionarApenasUm('#primeiro') // por id
        selecionarApenasUm('.destaque') // por classe
        selecionarApenasUm('[metade]')  // por atributo
        selecionarApenasUm('[destaque="2"]')  // por atributo
 
         //const primeiro = document.querySelector('#primeiro')
        //console.log(primeiro)
    </script>
</body>
</html>
