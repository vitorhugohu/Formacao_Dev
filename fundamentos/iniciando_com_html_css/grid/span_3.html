<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Span #03</title>
    <style>
        body {
            background-color: black;
            color: white;
            margin: 120px;
        }

        .grid > div {
            border: solid cyan 4px;
            padding: 5px;
            margin: 2px;
        }

        .grid {
            height: 100%;
            display: grid;
            grid-template-columns: [col-inicio] 1fr 
            [col-meio-1] 1fr 
            [col-meio-2 col-metade-2] 1fr 
            [col-fim];
            grid-template-rows: 1fr 1fr 1fr;
        }

        .d1 {
            grid-column-start: col-inicio;
            grid-column-end: col-meio-2;
            grid-column-end: col-metade-2;
        }
    </style>
</head>
<body>
    <div class="grid">
        <div class="d1">1</div>
        <div class="d2">2</div>
        <div class="d3">3</div>
    </div>
</body>
</html>
