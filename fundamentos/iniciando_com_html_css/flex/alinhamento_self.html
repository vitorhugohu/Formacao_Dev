<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlexBox: Alinhamento Self</title>
    <style>
      body {
        background-color: black;
        color: white;
      }

      .flex-container {
        /*height: 400px;*/
        border: solid crimson 5px;

        display: flex;

        flex-direction: row;

        /* Alinhamento no Main Axis */
        justify-content: center;

        /* Alinhamento no Cross Axis */
        align-items: stretch;
        align-items: flex-start;
        align-items: flex-end;
        align-items: center;
      }

      .flex-container > div {
        border: solid rgb(9, 203, 229) 5px;
        padding: 5px;
        margin: 5px;
      }

      .cima {
        align-self: flex-start;
      }

      .baixo {
        align-self: flex-end;
      }
    </style>
  </head>
  <body>
    <h1>FlexBox: Alinhamento Self</h1>
    <div class="flex-container">
      <div class="baixo">1</div>
      <div>2</div>
      <div class="cima">3</div>
      <div>4</div>
      <div class="baixo">5</div>
    </div>
  </body>
</html>
