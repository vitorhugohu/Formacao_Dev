<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlexBox: Crescimento</title>
    <style>
      body {
        background-color: black;
        color: white;
      }

      .flex-container {
        border: solid crimson 5px;

        display: flex;
        flex-direction: row;
      }

      .flex-container > div {
        border: solid rgb(9, 203, 229) 5px;
        padding: 5px;
        margin: 5px;
        /* width: 100px; */
        flex-basis: 100px;
      }

      .div-1, .div-2, .div-4 {
        flex-grow: 0;
      }

      .div-3 {
        /* flex-grow: 3; */
        flex: 3;
      }
    </style>
  </head>
  <body>
    <h1>FlexBox: Crescimento</h1>
    <div class="flex-container">
      <div class="div-1">1</div>
      <div class="div-2">2</div>
      <div class="div-3">3</div>
      <div class="div-4">4</div>
    </div>
  </body>
</html>
