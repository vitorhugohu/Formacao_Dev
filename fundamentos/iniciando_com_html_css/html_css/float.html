<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Float</title>
    <style>
        body {
            background-color: black;
        }

        .c1 {
            background-color: red;
            float: right;
        }
        
        .c2 {
            background-color: green;
            /* clear: right; */
            clear: right;
            float: right;
        }

        .c3 {
            background-color: blue;
           /*  float: left; */
        }

        .c4 {
            background-color: orange;
        }

        div {
            height: 150px;
            width: 150px;
            float: left;
        }
    </style>
</head>
<body>
    <div class="c1">

    </div>
    <div class="c2">

    </div>
    <div class="c3">

    </div>
    <div class="c4">

    </div>
</body>
</html>
