<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Sizing</title>
    <style>
        body {
            background-color: black;
            color: white;
        }

        .caixa {
            height: 80px;
            width: 80px;
            background-color: crimson;
            padding: 10px;
            border: 5px solid white;
            box-sizing: content-box;
        }
    </style>
</head>
<body>
    <div class="caixa">
        Conteúdo
    </div>
</body>
</html>
